services:
  llm-proxy:
    build:
      context: .
      dockerfile: Dockerfile
#    image: ghcr.io/knopka87/proxy-llm:main
#    pull_policy: always
    env_file:
      - .env
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_DETECT_MODEL: ${GEMINI_DETECT_MODEL:-gemini-2.0-flash-lite}
      GEMINI_PARSE_MODEL: ${GEMINI_PARSE_MODEL:-gemini-2.5-flash}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_DETECT_MODEL: ${OPENROUTER_DETECT_MODEL:-}
      OPENROUTER_PARSE_MODEL: ${OPENROUTER_PARSE_MODEL:-}
      OPENROUTER_HINT_MODEL: ${OPENROUTER_HINT_MODEL:-}
      OPENROUTER_CHECK_MODEL: ${OPENROUTER_CHECK_MODEL:-}
      OPENROUTER_ANALOGUE_MODEL: ${OPENROUTER_ANALOGUE_MODEL:-}
      PORT: ${PORT:-8000}
      PROMPT_DIR: /app/prompts
    ports:
      - "8000:8000"